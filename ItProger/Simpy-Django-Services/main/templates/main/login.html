{% extends 'main/layout.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="login-container">
    <h2>Sign In</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div class="login-message {% if message.tags == 'error' %}msg-error{% else %}msg-success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-login">
            Увійти на сайт
        </button>
    </form>
</div>
{% endblock %}
