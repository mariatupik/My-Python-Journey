    <br>
    <h1 style="text-align: left;">Register for the event:</h1>
    
    <form>
        <table border="0" cellpadding="5">
            <tr>
                <td><label for="username">User name:</label></td>
                <td><input type="text" id="username" name="username" placeholder="Enter your name"></td>
            </tr>
            <tr>
                <td><label for="user-email">Email:</label></td>
                <td><input type="email" id="user-email" name="user-email" placeholder="Enter your email"></td>
            </tr>
            <tr>
                <td><label for="user-pass">Password:</label></td>
                <td><input type="password" id="user-pass" name="user-pass" placeholder="Enter your password"></td>
            </tr>
            <tr>        
                <td><label for="user-file">Profile photo:</label></td>
                <td><input type="file" id="user-file" name="user-file"><br></td>
            </tr>
            <tr> 
                <td colspan="2">
                    <select name="Programming experience">
                        <option value="" disabled selected hidden>Programming experience</option>
                        <option value="up to 1 year">up to 1 year</option>
                        <option value="up to 3 year">up to 3 year</option>
                        <option value="up to 5 year">up to 5 year</option>
                        <option value="more than 5 years">more than 5 years</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <select name="language">
                        <option value="" disabled selected>Favorite programming language:</option>
                        <option value="python">Python</option>
                        <option value="php">PHP</option>
                        <option value="js">JavaScript</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="checkbox" id="user-check" name="user-check">
                    <label for="user-check">User consent</label>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>
