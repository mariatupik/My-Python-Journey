{% extends 'courses/base.html' %}
{% block content %}
<div class="card">
    <form method="post">
        {% csrf_token %}
        <h2>Ви впевнені, що хочете видалити курс "{{ object.title }}"?</h2>
        <button type="submit" class="btn" style="background-color: var(--error-color);">Так, видалити</button>
        <a href="{% url 'course_detail' object.slug %}" class="btn">Скасувати</a>
    </form>
</div>
{% endblock %}
