{% extends 'courses/base.html' %}

{% block title %}Вхід у систему{% endblock %}

{% block content %}
<div class="card">
    <h1>Вхід у систему</h1>
    
    {% if form.errors %}
        <p style="color: red;">Неправильне ім'я користувача або пароль. Спробуйте ще раз.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Увійти</button>
    </form>
    
    <div style="margin-top: 20px;">
        <small>Ще немає акаунту? <a href="{% url 'register' %}">Зареєструватися</a></small>
    </div>
</div>
{% endblock %}
