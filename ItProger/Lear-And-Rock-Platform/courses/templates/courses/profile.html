{% extends 'courses/base.html' %}
{% block content %}
<div class="card">
    <h1>Кабінет користувача</h1>
    <p><strong>@{{ user.username }}</strong><br>Email: {{ user.email }}</p>
    
    <hr class="separator">
    
    <h3>Змінити дані про користувача</h3>
    <form method="post">
        {% csrf_token %}
        {{ u_form.as_p }}
        <button type="submit" class="btn">Оновити дані</button>
    </form>
</div>
{% endblock %}
